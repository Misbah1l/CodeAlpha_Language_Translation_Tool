<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Language Translator</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <!-- Header -->

    <h1>🤖 AI Language Translator</h1>

    <p class="subtitle">
        Translate text into multiple languages instantly using Artificial Intelligence.
    </p>

    <!-- Translation Form -->

    <form method="POST" id="translatorForm">

        <!-- Input -->

        <label>
            <i class="fa-solid fa-keyboard"></i>
            Enter Text
        </label>

        <textarea
            id="inputText"
            name="text"
            rows="7"
            placeholder="Type something here..."
            required>{{ request.form.get('text','') }}</textarea>

        <!-- Statistics -->

        <div class="counter">

            <span>
                <i class="fa-solid fa-font"></i>
                Characters :
                <span id="charCount">0</span>
            </span>

            <span>
                <i class="fa-solid fa-align-left"></i>
                Words :
                <span id="wordCount">0</span>
            </span>

        </div>

        <!-- Language Selection -->

        <div class="row">

            <div class="col">

                <label>
                    <i class="fa-solid fa-globe"></i>
                    From
                </label>

                <select id="sourceLanguage" name="source">

                    {% for name, code in languages.items() %}

                    <option value="{{ code }}">
                        {{ name }}
                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="col d-flex align-items-end justify-content-center">

                <button
                    type="button"
                    id="swapBtn"
                    class="btn btn-warning">

                    <i class="fa-solid fa-right-left"></i>

                </button>

            </div>

            <div class="col">

                <label>
                    <i class="fa-solid fa-earth-asia"></i>
                    To
                </label>

                <select id="targetLanguage" name="target">

                    {% for name, code in languages.items() %}

                    <option value="{{ code }}">
                        {{ name }}
                    </option>

                    {% endfor %}

                </select>

            </div>

        </div>

        <!-- Buttons -->

        <div class="buttons">

            <button
                type="submit"
                class="btn-translate">

                <i class="fa-solid fa-language"></i>
                Translate

            </button>

            <button
                type="reset"
                class="btn-clear">

                <i class="fa-solid fa-trash"></i>
                Clear

            </button>

        </div>

        <!-- Loading Spinner -->

        <div class="loader" id="loader"></div>

    </form>

    <!-- Output -->

    <h2>
        <i class="fa-solid fa-language"></i>
        Translated Text
    </h2>

    <textarea
        id="outputText"
        rows="7"
        readonly>{{ translated_text }}</textarea>

    <!-- Action Buttons -->

    <div class="buttons">

        <button
            type="button"
            id="copyBtn"
            class="btn btn-primary">

            <i class="fa-solid fa-copy"></i>
            Copy

        </button>

        <button
            type="button"
            id="speakBtn"
            class="btn btn-info">

            <i class="fa-solid fa-volume-high"></i>
            Listen

        </button>

        <button
            type="button"
            id="downloadBtn"
            class="btn btn-dark">

            <i class="fa-solid fa-download"></i>
            Download

        </button>

    </div>

    <!-- Toast -->

    <div id="toast" class="toast-message">
        ✅ Text Copied Successfully
    </div>

    <!-- Footer -->

    <div class="footer">

        Developed with ❤️ by
        <span>Misbah Saeed</span>

        <br>

        CodeAlpha Artificial Intelligence Internship • 2026

    </div>

</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
